pre-commit:
  parallel: false
  commands:
    prettier:
      glob: '*.{js,ts,svelte,css,json,md}'
      run: bunx prettier --write {staged_files}
      stage_fixed: true
    eslint:
      glob: '*.{js,ts,svelte}'
      run: bunx eslint --fix {staged_files}
      stage_fixed: true
    check:
      run: bun run check

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}
